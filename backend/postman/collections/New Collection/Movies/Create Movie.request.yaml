$kind: http-request
name: Create Movie
url: '{{baseUrl}}/api/movies'
method: POST
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Test Movie",
      "genre": "Action",
      "language": "English",
      "duration": 120,
      "price": 200,
      "availableSeats": 100,
      "rating": 4.5,
      "director": "Test Director",
      "cast": ["Actor 1", "Actor 2"]
    }
order: 5000
